<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    >

    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Secret Links</title>

    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/styles.css?v=20260716-1">
    <script src="/life-background.js?v=20260716-1" defer></script>
    <script
        async
        src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9656842316705627"
        crossorigin="anonymous"
    ></script>
</head>

<body>
    <main class="container">
        <h1>Secret Links</h1>

        <p>Access exclusive resources below:</p>

        <div
            class="link-container"
            id="link-container"
        ></div>
    </main>

    <script>
        const links = [
            {
                text: "Ask a question.",
                url: "https://magic-8ball.com/"
            },
            {
                text: "Find the answer.",
                url: "https://libraryofbabel.info/"
            },
            {
                text: "Soothe your mind.",
                url: "https://optical.toys/"
            }
        ];

        function generateLinks() {
            const container = document.getElementById("link-container");

            container.replaceChildren();

            links.forEach((link) => {
                const button = document.createElement("a");

                button.href = link.url;
                button.className = "btn";
                button.textContent = link.text;

                container.appendChild(button);
            });
        }

        generateLinks();
    </script>
</body>
</html>
