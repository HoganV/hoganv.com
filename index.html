<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    >

    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>hoganv.com</title>

    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/styles.css">

    <script src="/life-background.js" defer></script>

    <script
        src="https://www.google.com/recaptcha/api.js"
        async
        defer
    ></script>

    <script
        async
        src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9656842316705627"
        crossorigin="anonymous"
    ></script>
</head>

<body>
    <main class="container">
        <h1>Welcome to hoganv.com</h1>

        <p>Please visit the links below to reach me.</p>

        <div class="link-container">
            <a
                href="https://www.linkedin.com/in/hoganv"
                class="btn"
            >
                Visit my LinkedIn
            </a>

            <button
                class="btn"
                id="email-button"
                type="button"
            >
                Email Me
            </button>

            <button
                class="btn"
                id="phone-button"
                type="button"
            >
                Show Phone Number
            </button>
        </div>

        <div
            class="g-recaptcha center-captcha"
            id="recaptcha-box"
            data-sitekey="6LeB33AqAAAAACH5yMQwLR7krQKocS5VhhQIQYyD"
            data-callback="captchaCallback"
            style="display: none;"
        ></div>
    </main>

    <script>
        const encodedEmail = "krjdq@krjdqy.frp";
        const encodedPhone = "(735) 915-5220";

        let isCaptchaVerified = false;
        let currentAction = null;

        const emailButton = document.getElementById("email-button");
        const phoneButton = document.getElementById("phone-button");
        const recaptchaBox = document.getElementById("recaptcha-box");

        emailButton.addEventListener("click", showEmail);
        phoneButton.addEventListener("click", showPhone);

        function showEmail() {
            if (!isCaptchaVerified) {
                currentAction = "email";
                showCaptcha();
                return;
            }

            const decodedEmail = caesarShift(encodedEmail, -3);

            emailButton.textContent = decodedEmail;
            emailButton.onclick = () => {
                copyToClipboard(decodedEmail, emailButton);
            };
        }

        function showPhone() {
            if (!isCaptchaVerified) {
                currentAction = "phone";
                showCaptcha();
                return;
            }

            const decodedPhone = caesarShift(encodedPhone, -3);

            phoneButton.textContent = decodedPhone;
            phoneButton.onclick = () => {
                copyToClipboard(decodedPhone, phoneButton);
            };
        }

        function showCaptcha() {
            recaptchaBox.style.display = "flex";
        }

        function captchaCallback() {
            recaptchaBox.style.display = "none";
            isCaptchaVerified = true;

            if (currentAction === "email") {
                showEmail();
            } else if (currentAction === "phone") {
                showPhone();
            }

            currentAction = null;
        }

        function caesarShift(value, amount) {
            return value.replace(/[a-zA-Z0-9]/g, (character) => {
                let code = character.charCodeAt(0);

                if (character >= "a" && character <= "z") {
                    code = ((code - 97 + amount + 26) % 26) + 97;
                } else if (character >= "A" && character <= "Z") {
                    code = ((code - 65 + amount + 26) % 26) + 65;
                } else if (character >= "0" && character <= "9") {
                    code = ((code - 48 + amount + 10) % 10) + 48;
                }

                return String.fromCharCode(code);
            });
        }

        async function copyToClipboard(text, button) {
            try {
                await navigator.clipboard.writeText(text);

                const originalText = button.textContent;
                button.textContent = "Copied!";

                window.setTimeout(() => {
                    button.textContent = originalText;
                }, 1500);
            } catch (error) {
                console.error("Failed to copy:", error);
            }
        }
    </script>
</body>
</html>
